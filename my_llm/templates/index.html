<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جعفر AI 🇩🇿</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-flag">🇩🇿</div>
    <div>
      <div class="logo-title">جعفر AI</div>
      <div class="logo-sub">نموذج شخصي · ورقلة</div>
    </div>
  </div>

  <button id="new-chat-btn">✏️ دردشة جديدة</button>

  <div class="section-label">المحادثات السابقة</div>
  <div id="history-list"></div>

  <div class="sidebar-footer">
    <button class="footer-btn" id="settings-btn">⚙️ الإعدادات</button>
    <button class="footer-btn danger" id="clear-btn">🗑️ حذف الكل</button>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <header id="topbar">
    <span id="chat-title">دردشة جديدة</span>
    <div class="model-selector">
      <span>🤖</span>
      <select id="model-picker">
        <option value="v1">Model v1</option>
        <option value="v2" selected>Model v2</option>
      </select>
    </div>
  </header>

  <div id="chat-box">
    <div id="welcome">
      <div class="welcome-flag">🇩🇿</div>
      <h1>مرحباً في جعفر AI</h1>
      <p>اسألني أي شيء عن جعفر لشهب، المبرمج الجزائري من ورقلة</p>
      <div id="suggestions">
        <button class="sug-btn">من هو جعفر؟</button>
        <button class="sug-btn">أين يسكن جعفر؟</button>
        <button class="sug-btn">ما مشاريع جعفر؟</button>
        <button class="sug-btn">ما لغته المفضلة؟</button>
        <button class="sug-btn">هل يحب الشطرنج؟</button>
        <button class="sug-btn">من والد جعفر؟</button>
      </div>
    </div>
  </div>

  <footer id="input-area">
    <div id="input-box">
      <textarea id="user-input" placeholder="اسأل عن جعفر لشهب..." rows="1"></textarea>
      <button id="send-btn" title="إرسال">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="input-hint">Enter للإرسال &nbsp;·&nbsp; Shift+Enter لسطر جديد</div>
  </footer>
</main>

<!-- SETTINGS MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-head">
      <h3>⚙️ الإعدادات</h3>
      <button id="close-modal">✕</button>
    </div>

    <label class="setting-label">النموذج الافتراضي</label>
    <select class="setting-input" id="s-model">
      <option value="v1">Model v1 — خفيف</option>
      <option value="v2" selected>Model v2 — متقدم</option>
    </select>

    <label class="setting-label">
      درجة الإبداع — <strong id="s-temp-val">0.6</strong>
    </label>
    <input class="setting-range" type="range" id="s-temp"
      min="0.1" max="1.0" step="0.1" value="0.6">

    <label class="setting-label">
      أقصى طول للرد — <strong id="s-tokens-val">60</strong> token
    </label>
    <input class="setting-range" type="range" id="s-tokens"
      min="20" max="150" step="10" value="60">

    <button id="save-settings-btn">💾 حفظ</button>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جعفر AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { background: #16213e; padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
  header h1 { font-size: 1.3rem; color: #e94560; }
  .model-select select { background: #0f3460; color: #eee; border: 1px solid #e94560; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }

  /* Chat area */
  #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

  .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .user-msg { background: #0f3460; align-self: flex-start; border-bottom-right-radius: 4px; }
  .bot-msg  { background: #16213e; border: 1px solid #e94560; align-self: flex-end; border-bottom-left-radius: 4px; }

  .bot-msg .source { font-size: 0.7rem; color: #e94560; margin-top: 5px; }

  /* Typing */
  .typing span { display: inline-block; width: 8px; height: 8px; background: #e94560; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  /* Input */
  footer { background: #16213e; padding: 15px 20px; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
  footer input { flex: 1; background: #0f3460; color: #eee; border: 1px solid #e94560; border-radius: 12px; padding: 12px 16px; font-size: 1rem; outline: none; }
  footer input::placeholder { color: #aaa; }
  footer button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
  footer button:hover { background: #c73652; }
</style>
</head>
<body>

<header>
  <h1>🤖 جعفر AI</h1>
  <div class="model-select">
    <select id="model-picker">
      <option value="v1">Model v1</option>
      <option value="v2" selected>Model v2</option>
    </select>
  </div>
</header>

<div id="chat-box">
  <div class="message bot-msg">
    مرحباً! أنا نموذج جعفر الشخصي. اسألني أي شيء عن جعفر لشهب! 😊
  </div>
</div>

<footer>
  <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." autofocus />
  <button onclick="sendMessage()">إرسال</button>
</footer>

<script>
const chatBox    = document.getElementById('chat-box');
const inputField = document.getElementById('user-input');
const modelPicker = document.getElementById('model-picker');

function addMessage(text, type, source='') {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = text;
  if (source) {
    div.innerHTML += `<div class="source">via ${source}</div>`;
  }
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message bot-msg typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const message = inputField.value.trim();
  if (!message) return;

  addMessage(message, 'user-msg');
  inputField.value = '';
  showTyping();

  const response = await fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, model: modelPicker.value })
  });

  const data = await response.json();
  removeTyping();
  addMessage(data.response, 'bot-msg', data.source || '');
}

inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
